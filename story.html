<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Story Analysis</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap");

    :root {
      --background: #f4f1ec;
      --surface: #fffdf9;
      --surface-soft: #f8f5ef;
      --text: #211f1c;
      --text-soft: #615d55;
      --text-faint: #918a7e;
      --border: #ded6ca;
      --accent: #1a3a2f;
      --accent-mid: #2d5c47;
      --red-deep: #7a1f1f;
      --red-mid: #c0392b;
      --red-bg: #fbeaea;
      --green-deep: #1a3a1f;
      --green-light: #e8f2ea;
      --amber: #92580a;
      --amber-bg: #fef3e2;
      --radius-sm: 5px;
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes barGrow {
      from {
        transform: scaleX(0);
      }
      to {
        transform: scaleX(1);
      }
    }

    @keyframes softPulse {
      0%, 100% {
        box-shadow: 0 0 0 0 rgba(45, 92, 71, 0.2);
      }
      50% {
        box-shadow: 0 0 0 6px rgba(45, 92, 71, 0);
      }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: var(--background);
      color: var(--text);
      font-family: "Outfit", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      width: min(980px, calc(100% - 28px));
      margin: 18px auto 36px;
      animation: fadeUp 360ms ease-out both;
    }

    .top-bar,
    .story-header,
    .panel {
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      background: var(--surface);
    }

    .top-bar {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 12px;
      padding: 22px 24px;
      box-shadow: 0 22px 70px rgba(33, 31, 28, 0.08);
    }

    .eyebrow,
    .back-link,
    .meta,
    .status-badge,
    .panel-title,
    .delta,
    .bar-val,
    .rec-num {
      font-family: "DM Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    .eyebrow {
      margin-bottom: 4px;
      color: var(--accent-mid);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1,
    h2,
    .score-pill .n,
    .metric-card .val {
      font-family: "DM Serif Display", Georgia, serif;
      font-weight: 400;
    }

    h1 {
      font-size: clamp(2rem, 4vw, 2.65rem);
      line-height: 1.05;
    }

    h1 em {
      color: var(--accent-mid);
      font-style: italic;
    }

    .subtitle {
      margin-top: 5px;
      color: var(--text-soft);
      font-size: 13px;
      font-weight: 300;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      min-height: 35px;
      padding: 0 14px;
      border: 1px solid var(--accent);
      border-radius: var(--radius-sm);
      background: var(--accent);
      color: #ffffff;
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      white-space: nowrap;
      transition: background 0.14s, transform 0.12s;
    }

    .back-link:hover {
      background: var(--accent-mid);
      transform: translateY(-1px);
    }

    .story-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 12px;
      padding: 20px 24px;
      animation: fadeUp 360ms ease-out 80ms both;
    }

    .story-header-left {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .score-pill {
      min-width: 64px;
      padding: 10px 16px;
      border-radius: 10px;
      color: #ffffff;
      text-align: center;
      animation: softPulse 1600ms ease-out 300ms 2;
    }

    .score-pill.high {
      background: var(--red-mid);
    }

    .score-pill.medium {
      background: var(--amber);
    }

    .score-pill.low {
      background: var(--accent);
    }

    .score-pill .n {
      color: #ffffff;
      font-size: 30px;
      line-height: 1;
    }

    .score-pill .t {
      margin-top: 3px;
      font-family: "DM Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 9px;
      letter-spacing: 0.12em;
      opacity: 0.75;
      text-transform: uppercase;
    }

    .story-info h2 {
      color: var(--text);
      font-size: 26px;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 4px;
      color: var(--text-faint);
      font-size: 10px;
    }

    .status-badge {
      align-self: flex-start;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .status-badge.high {
      border: 0.5px solid rgba(192, 57, 43, 0.2);
      background: var(--red-bg);
      color: var(--red-deep);
    }

    .status-badge.medium {
      border: 0.5px solid rgba(146, 88, 10, 0.2);
      background: var(--amber-bg);
      color: var(--amber);
    }

    .status-badge.low {
      border: 0.5px solid rgba(29, 78, 54, 0.16);
      background: var(--green-light);
      color: var(--green-deep);
    }

    .metrics-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .metric-card {
      padding: 12px 14px;
      border-radius: var(--radius-md);
      background: var(--surface-soft);
      animation: fadeUp 320ms ease-out both;
      transition: transform 0.14s, background 0.14s;
    }

    .metric-card:hover {
      background: #f0eadf;
      transform: translateY(-1px);
    }

    .metric-card:nth-child(2) {
      animation-delay: 80ms;
    }

    .metric-card:nth-child(3) {
      animation-delay: 140ms;
    }

    .metric-card:nth-child(4) {
      animation-delay: 200ms;
    }

    .metric-card .val {
      color: var(--text);
      font-size: 24px;
      line-height: 1;
    }

    .metric-card .val.bad {
      color: var(--red-mid);
    }

    .metric-card .val.ok {
      color: var(--accent-mid);
    }

    .metric-card .lbl {
      margin-top: 4px;
      color: var(--text-soft);
      font-size: 11px;
      font-weight: 300;
    }

    .delta {
      margin-top: 6px;
      color: var(--text-faint);
      font-size: 10px;
    }

    .delta.down {
      color: var(--red-mid);
    }

    .delta.up {
      color: var(--accent-mid);
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    .panel {
      padding: 16px 20px;
      animation: fadeUp 340ms ease-out 160ms both;
    }

    .panel-title {
      margin-bottom: 12px;
      color: var(--text-faint);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .issue-row,
    .rec-item {
      display: flex;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 0.5px solid var(--border);
      animation: fadeUp 260ms ease-out both;
    }

    .issue-row:nth-child(3),
    .rec-item:nth-child(3) {
      animation-delay: 60ms;
    }

    .issue-row:nth-child(4),
    .rec-item:nth-child(4) {
      animation-delay: 120ms;
    }

    .issue-row:nth-child(5),
    .rec-item:nth-child(5) {
      animation-delay: 180ms;
    }

    .issue-row:last-child,
    .rec-item:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .issue-icon,
    .rec-num {
      display: flex;
      flex: 0 0 auto;
      align-items: center;
      justify-content: center;
      margin-top: 1px;
      border-radius: 6px;
      font-size: 11px;
    }

    .issue-icon {
      width: 28px;
      height: 28px;
      font-family: "DM Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    .issue-icon.red {
      background: var(--red-bg);
      color: var(--red-mid);
    }

    .issue-icon.amber {
      background: var(--amber-bg);
      color: var(--amber);
    }

    .issue-icon.green {
      background: var(--green-light);
      color: var(--green-deep);
    }

    .issue-body .title,
    .rec-body .title {
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
    }

    .issue-body .desc,
    .rec-body .desc {
      margin-top: 2px;
      color: var(--text-soft);
      font-size: 12px;
      font-weight: 300;
      line-height: 1.45;
    }

    .bar-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 9px;
    }

    .bar-label {
      min-width: 92px;
      color: var(--text-soft);
      font-size: 12px;
      font-weight: 300;
    }

    .bar-track {
      flex: 1;
      height: 6px;
      overflow: hidden;
      border-radius: 3px;
      background: var(--surface-soft);
    }

    .bar-fill {
      height: 100%;
      border-radius: 3px;
      animation: barGrow 700ms ease-out both;
      transform-origin: left;
    }

    .bar-val {
      min-width: 38px;
      color: var(--text-soft);
      font-size: 11px;
      text-align: right;
    }

    .rec-num {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      background: var(--accent);
      color: #ffffff;
      transition: transform 0.14s;
    }

    .rec-item:hover .rec-num {
      transform: scale(1.08);
    }

    .loading-state,
    .error-state {
      min-height: 260px;
      padding: 48px 16px;
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      background: var(--surface);
      color: var(--text-soft);
      text-align: center;
    }

    .error-state {
      border-color: rgba(192, 57, 43, 0.28);
      background: var(--red-bg);
      color: var(--red-deep);
    }

    @media (max-width: 760px) {
      .top-bar,
      .story-header {
        flex-direction: column;
        align-items: stretch;
      }

      .two-col,
      .metrics-row {
        grid-template-columns: 1fr;
      }

      .story-header-left {
        align-items: flex-start;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 1ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="top-bar">
      <div>
        <div class="eyebrow">Story Analysis</div>
        <h1>Story <em>AI</em> Detail</h1>
        <p class="subtitle">Focused recommendations for one selected story</p>
      </div>
      <a class="back-link" href="index.html">Back to dashboard</a>
    </header>

    <section id="storyPage">
      <div class="loading-state">Loading selected story...</div>
    </section>
  </main>

  <script>
    const API_BASE = "http://127.0.0.1:8000";
    const page = document.getElementById("storyPage");
    const storyId = Number(new URLSearchParams(window.location.search).get("id"));

    function getPriority(story) {
      if (story.priority_score >= 70) return "high";
      if (story.priority_score >= 30) return "medium";
      return "low";
    }

    function formatPriority(priority) {
      return priority.charAt(0).toUpperCase() + priority.slice(1);
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function getIssueCopy(issue) {
      const copy = {
        "Low completion rate": {
          title: "Low completion rate",
          description: "Users are dropping off before the story ends. Tighten the opening hook and remove slow setup.",
          tone: "red"
        },
        "Low click-through rate": {
          title: "Low click-through rate",
          description: "The call-to-action is not earning enough taps. Test clearer CTA copy and move it earlier in the story.",
          tone: "red"
        },
        "Low visibility": {
          title: "Low visibility",
          description: "The story is reaching a smaller audience than expected. Review placement, tags and distribution timing.",
          tone: "amber"
        }
      };

      return copy[issue] || {
        title: issue,
        description: "This issue is affecting story performance and should be reviewed.",
        tone: "amber"
      };
    }

    function getRecommendations(story) {
      const issues = new Set(story.issues || []);
      const recommendations = [];

      if (issues.has("Low completion rate")) {
        recommendations.push({
          title: "Rework the opening hook",
          description: "Lead with the strongest moment, question or stat in the first few seconds so viewers have a reason to continue."
        });
        recommendations.push({
          title: "Shorten the story path",
          description: "Trim setup and secondary context. Keep each slide focused on one job and move quickly toward the payoff."
        });
      }

      if (issues.has("Low click-through rate")) {
        recommendations.push({
          title: "Move the CTA earlier",
          description: "Add a mid-story prompt while attention is still high, then repeat a concise CTA at the end."
        });
      }

      if (issues.has("Low visibility")) {
        recommendations.push({
          title: "Review placement and tags",
          description: "Audit category tags, publishing time and placement slots to make sure the story is being surfaced to the right audience."
        });
      }

      if (!recommendations.length) {
        recommendations.push({
          title: "Keep monitoring performance",
          description: "This story has no major flagged issues. Watch the next 24 hours for changes in completion or click-through behavior."
        });
      }

      return recommendations;
    }

    function renderBar(label, value, color) {
      return `
        <div class="bar-row">
          <div class="bar-label">${escapeHtml(label)}</div>
          <div class="bar-track"><div class="bar-fill" style="width: ${value}%; background: ${color};"></div></div>
          <div class="bar-val">${value}%</div>
        </div>
      `;
    }

    function renderStory(story) {
      const priority = getPriority(story);
      const completionHealth = story.issues.includes("Low completion rate") ? 24 : 78;
      const clickHealth = story.issues.includes("Low click-through rate") ? 18 : 68;
      const visibilityHealth = story.issues.includes("Low visibility") ? 28 : 72;
      const issueRows = story.issues.length
        ? story.issues.map(issue => {
            const issueCopy = getIssueCopy(issue);
            return `
              <div class="issue-row">
                <div class="issue-icon ${issueCopy.tone}">${issueCopy.tone === "red" ? "!" : "i"}</div>
                <div class="issue-body">
                  <div class="title">${escapeHtml(issueCopy.title)}</div>
                  <div class="desc">${escapeHtml(issueCopy.description)}</div>
                </div>
              </div>
            `;
          }).join("")
        : `
          <div class="issue-row">
            <div class="issue-icon green">OK</div>
            <div class="issue-body">
              <div class="title">No major issues detected</div>
              <div class="desc">The analyzer is not flagging completion, click-through or visibility problems for this story.</div>
            </div>
          </div>
        `;
      const recommendations = getRecommendations(story).map((item, index) => `
        <div class="rec-item">
          <div class="rec-num">${index + 1}</div>
          <div class="rec-body">
            <div class="title">${escapeHtml(item.title)}</div>
            <div class="desc">${escapeHtml(item.description)}</div>
          </div>
        </div>
      `).join("");

      page.innerHTML = `
        <div class="story-header">
          <div class="story-header-left">
            <div class="score-pill ${priority}">
              <div class="n">${escapeHtml(story.priority_score)}</div>
              <div class="t">${formatPriority(priority)}</div>
            </div>
            <div class="story-info">
              <h2>${escapeHtml(story.title)}</h2>
              <div class="meta">
                <span>Story #${escapeHtml(story.story_id)}</span>
                <span>Live analyzer data</span>
              </div>
            </div>
          </div>
          <div class="status-badge ${priority}">${priority === "low" ? "Performing well" : "Needs attention"}</div>
        </div>

        <div class="metrics-row">
          <div class="metric-card">
            <div class="val ok">${escapeHtml(story.views)}</div>
            <div class="lbl">Views</div>
            <div class="delta up">Reach signal</div>
          </div>
          <div class="metric-card">
            <div class="val ok">${escapeHtml(story.clicks)}</div>
            <div class="lbl">Clicks</div>
            <div class="delta up">${escapeHtml(story.ctr)}% CTR</div>
          </div>
          <div class="metric-card">
            <div class="val ${story.issues.includes("Low completion rate") ? "bad" : "ok"}">${escapeHtml(story.completion_rate)}%</div>
            <div class="lbl">Completion rate</div>
            <div class="delta ${story.issues.includes("Low completion rate") ? "down" : "up"}">${story.issues.includes("Low completion rate") ? "Below threshold" : "Healthy"}</div>
          </div>
          <div class="metric-card">
            <div class="val ${story.issues.length ? "bad" : "ok"}">${escapeHtml(story.issues.length)}</div>
            <div class="lbl">Open issues</div>
            <div class="delta ${story.issues.length ? "down" : "up"}">${story.issues.length ? "Flagged by analyzer" : "No flags"}</div>
          </div>
        </div>

        <div class="two-col">
          <div class="panel">
            <div class="panel-title">Flagged issues</div>
            ${issueRows}
          </div>
          <div class="panel">
            <div class="panel-title">Engagement breakdown</div>
            ${renderBar("Completion", completionHealth, story.issues.includes("Low completion rate") ? "var(--red-mid)" : "var(--accent-mid)")}
            ${renderBar("Click-through", clickHealth, story.issues.includes("Low click-through rate") ? "var(--red-mid)" : "var(--accent-mid)")}
            ${renderBar("Visibility", visibilityHealth, story.issues.includes("Low visibility") ? "var(--amber)" : "var(--accent-mid)")}
            ${renderBar("Priority", Math.min(story.priority_score, 100), priority === "high" ? "var(--red-mid)" : priority === "medium" ? "var(--amber)" : "var(--accent)")}
          </div>
        </div>

        <div class="panel">
          <div class="panel-title">AI recommendations</div>
          ${recommendations}
        </div>
      `;
    }

    function renderError(message) {
      page.innerHTML = `
        <div class="error-state">
          <strong>${escapeHtml(message)}</strong>
          <div>Return to the dashboard or start the FastAPI backend on port 8000.</div>
        </div>
      `;
    }

    async function loadStory() {
      if (!storyId) {
        renderError("No story ID was provided.");
        return;
      }

      try {
        const response = await fetch(`${API_BASE}/analyze`);
        if (!response.ok) {
          throw new Error(`Analyze request failed with ${response.status}`);
        }

        const data = await response.json();
        const story = (data.results || []).find(item => item.story_id === storyId);
        if (!story) {
          renderError(`Story #${storyId} was not found.`);
          return;
        }

        document.title = `${story.title} - Story Analysis`;
        renderStory(story);
      } catch (error) {
        console.error(error);
        renderError("Could not load story analysis.");
      }
    }

    loadStory();
  </script>
</body>
</html>
