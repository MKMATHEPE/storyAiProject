<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Story AI Dashboard</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap");

    :root {
      --background: #f4f1ec;
      --surface: #fffdf9;
      --surface-soft: #f8f5ef;
      --surface-muted: #eee9df;
      --text: #211f1c;
      --text-soft: #615d55;
      --text-faint: #918a7e;
      --border: #ded6ca;
      --border-strong: #c9bdae;
      --accent: #1a3a2f;
      --accent-mid: #2d5c47;
      --accent-light: #e8f2ed;
      --red-deep: #7a1f1f;
      --red-mid: #c0392b;
      --red-bg: #fbeaea;
      --green-deep: #1a3a1f;
      --green-light: #e8f2ea;
      --amber: #92580a;
      --amber-bg: #fef3e2;
      --radius-sm: 5px;
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes softPulse {
      0% {
        box-shadow: inset 0 0 0 0 rgba(255, 255, 255, 0.24);
      }
      70% {
        box-shadow: inset 0 0 0 14px rgba(255, 255, 255, 0);
      }
      100% {
        box-shadow: inset 0 0 0 0 rgba(255, 255, 255, 0);
      }
    }

    @keyframes shimmer {
      from {
        background-position: 120% 0;
      }
      to {
        background-position: -120% 0;
      }
    }

    @keyframes badgePop {
      0% {
        transform: scale(0.92);
      }
      60% {
        transform: scale(1.08);
      }
      100% {
        transform: scale(1);
      }
    }

    @keyframes tagReveal {
      from {
        opacity: 0;
        transform: translateY(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes borderSweep {
      from {
        transform: translateX(-110%);
      }
      to {
        transform: translateX(110%);
      }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: var(--background);
      color: var(--text);
      font-family: "Outfit", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button {
      font: inherit;
    }

    .dashboard {
      width: min(1180px, calc(100% - 28px));
      margin: 18px auto 36px;
      overflow: hidden;
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      background: var(--surface);
      box-shadow: 0 22px 70px rgba(33, 31, 28, 0.1);
      animation: fadeUp 420ms ease-out both;
    }

    .top-bar {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      padding: 28px 32px 20px;
      border-bottom: 0.5px solid var(--border);
      background: var(--surface);
    }

    .eyebrow,
    .section-label,
    .panel-title,
    .count-note,
    .last-updated,
    .refresh-btn,
    .badge,
    .story-num,
    .story-ts,
    .tag,
    .score-slab .tier,
    .metric-card .delta,
    .mini-label,
    .action-btn {
      font-family: "DM Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    .eyebrow {
      margin-bottom: 4px;
      color: var(--accent-mid);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1,
    h2,
    .stat-card .val,
    .score-slab .num,
    .score-pill .n,
    .metric-card .val {
      font-family: "DM Serif Display", Georgia, serif;
      font-weight: 400;
    }

    h1 {
      color: var(--text);
      font-size: clamp(2rem, 4vw, 2.65rem);
      line-height: 1.05;
    }

    h1 em {
      color: var(--accent-mid);
      font-style: italic;
    }

    .subtitle {
      margin-top: 5px;
      color: var(--text-soft);
      font-size: 13px;
      font-weight: 300;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .last-updated {
      color: var(--text-faint);
      font-size: 10px;
      white-space: nowrap;
    }

    .refresh-btn {
      position: relative;
      overflow: hidden;
      min-height: 35px;
      padding: 0 18px;
      border: 1px solid var(--accent);
      border-radius: var(--radius-sm);
      background: var(--accent);
      color: #ffffff;
      cursor: pointer;
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    .refresh-btn::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.18), transparent);
      transform: translateX(-110%);
    }

    .refresh-btn:hover {
      background: var(--accent-mid);
    }

    .refresh-btn:hover::after {
      animation: borderSweep 700ms ease-out;
    }

    .refresh-btn:active {
      transform: scale(0.97);
    }

    .refresh-btn:disabled {
      cursor: wait;
      opacity: 0.7;
    }

    .body-grid {
      display: grid;
      grid-template-columns: 252px 1fr;
      min-height: 520px;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 24px;
      padding: 20px;
      border-right: 0.5px solid var(--border);
      background: var(--surface);
    }

    .section-label {
      margin-bottom: 8px;
      color: var(--text-faint);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
    }

    .stat-card {
      min-height: 70px;
      padding: 11px 13px;
      border-radius: var(--radius-md);
      background: var(--surface-soft);
      animation: fadeUp 360ms ease-out both;
    }

    .stat-card:nth-child(2) {
      animation-delay: 60ms;
    }

    .stat-card:nth-child(3) {
      animation-delay: 120ms;
    }

    .stat-card:nth-child(4) {
      animation-delay: 180ms;
    }

    .stat-card .val {
      color: var(--text);
      font-size: 26px;
      line-height: 1;
    }

    .stat-card .lbl {
      margin-top: 3px;
      color: var(--text-soft);
      font-size: 11px;
      font-weight: 300;
      line-height: 1.2;
    }

    .legend {
      padding: 11px 13px;
      border-radius: var(--radius-md);
      background: var(--surface-soft);
      color: var(--text-soft);
      font-size: 11.5px;
      line-height: 1.5;
    }

    .legend-title {
      margin-bottom: 7px;
      color: var(--text-faint);
      font-family: "DM Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 5px;
    }

    .legend-row:last-child {
      margin-bottom: 0;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      flex: 0 0 auto;
      border-radius: 2px;
    }

    .filter-list {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .filter-item {
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      min-height: 35px;
      padding: 0 11px;
      border: 1px solid transparent;
      border-radius: 6px;
      background: transparent;
      color: var(--text-soft);
      cursor: pointer;
      font-size: 13px;
      text-align: left;
      transition: background 0.12s, color 0.12s, transform 0.12s;
    }

    .filter-item:hover {
      background: var(--surface-soft);
      color: var(--text);
      transform: translateX(2px);
    }

    .filter-item.active {
      border-color: rgba(29, 78, 54, 0.15);
      background: var(--accent-light);
      color: var(--accent);
      font-weight: 500;
    }

    .filter-item.active::before {
      content: "";
      position: absolute;
      inset: 6px auto 6px 0;
      width: 3px;
      border-radius: 3px;
      background: var(--accent-mid);
      animation: fadeUp 180ms ease-out both;
    }

    .fi-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .fi-icon {
      width: 14px;
      color: currentColor;
      font-family: "DM Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 11px;
    }

    .badge {
      padding: 1px 7px;
      border: 0.5px solid var(--border-strong);
      border-radius: 20px;
      background: var(--surface);
      color: var(--text-soft);
      font-size: 10px;
    }

    .filter-item.active .badge {
      border-color: transparent;
      background: var(--accent);
      color: #ffffff;
      animation: badgePop 220ms ease-out both;
    }

    .ai-box {
      padding: 11px 13px;
      border-left: 3px solid var(--accent-mid);
      border-radius: 0 6px 6px 0;
      background: var(--accent-light);
      color: var(--accent);
      font-size: 12px;
      line-height: 1.55;
      transition: background 0.18s, transform 0.18s;
    }

    .ai-box:hover {
      background: #dceee7;
      transform: translateY(-1px);
    }

    .ai-box strong {
      display: block;
      margin-bottom: 5px;
      font-family: "DM Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 9px;
      letter-spacing: 0.1em;
      opacity: 0.7;
      text-transform: uppercase;
    }

    .main-panel {
      padding: 20px 24px 24px;
      background: var(--background);
    }

    .panel-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .panel-header h2 {
      color: var(--text);
      font-size: 21px;
      line-height: 1;
    }

    .count-note {
      color: var(--text-faint);
      font-size: 10px;
      white-space: nowrap;
    }

    .story-list {
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    .story-card {
      display: grid;
      grid-template-columns: 80px 1fr;
      overflow: hidden;
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      background: var(--surface);
      cursor: pointer;
      animation: fadeUp 1100ms cubic-bezier(0.22, 1, 0.36, 1) both;
      transition:
        border-color 360ms ease,
        box-shadow 360ms ease,
        transform 420ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    .story-card:nth-child(2) {
      animation-delay: 180ms;
    }

    .story-card:nth-child(3) {
      animation-delay: 360ms;
    }

    .story-card:nth-child(4) {
      animation-delay: 540ms;
    }

    .story-card:hover,
    .story-card:focus-visible {
      border-color: var(--border-strong);
      box-shadow: 0 8px 20px rgba(33, 31, 28, 0.06);
      outline: none;
      transform: translateY(-1px);
    }

    .score-slab {
      display: flex;
      position: relative;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 18px 0;
      color: #ffffff;
      animation: softPulse 1200ms ease-out 250ms 1;
    }

    .score-slab.high {
      background: var(--red-mid);
    }

    .score-slab.medium {
      background: var(--amber);
    }

    .score-slab.low {
      background: var(--accent);
    }

    .score-slab .mini-icon {
      margin-bottom: 2px;
      font-family: "DM Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 10px;
      letter-spacing: 0.08em;
      opacity: 0.72;
    }

    .score-slab .num {
      color: #ffffff;
      font-size: 28px;
      line-height: 1;
    }

    .score-slab .tier {
      color: rgba(255, 255, 255, 0.7);
      font-size: 8px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .story-body {
      display: flex;
      flex-direction: column;
      gap: 7px;
      padding: 15px 18px;
    }

    .story-meta {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
    }

    .story-title {
      color: var(--text);
      font-size: 14px;
      font-weight: 500;
    }

    .story-meta-right {
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    .story-num,
    .story-ts {
      color: var(--text-faint);
      font-size: 10px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .tag {
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 10.5px;
      animation: tagReveal 220ms ease-out both;
      transition: transform 0.12s;
    }

    .tag:hover {
      transform: translateY(-1px);
    }

    .tag.issue {
      border: 0.5px solid rgba(192, 57, 43, 0.18);
      background: var(--red-bg);
      color: var(--red-deep);
    }

    .tag.warn {
      border: 0.5px solid rgba(146, 88, 10, 0.18);
      background: var(--amber-bg);
      color: var(--amber);
    }

    .tag.ok {
      border: 0.5px solid rgba(29, 78, 54, 0.15);
      background: var(--green-light);
      color: var(--green-deep);
    }

    .story-desc {
      color: var(--text-soft);
      font-size: 12px;
      font-weight: 300;
      line-height: 1.5;
    }

    .story-kpis {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 7px;
      margin-top: 2px;
    }

    .story-kpi {
      padding: 8px 9px;
      border-radius: var(--radius-md);
      background: var(--surface-soft);
      transition: background 0.15s, transform 0.15s;
    }

    .story-kpi:nth-child(2) {
      transition-delay: 30ms;
    }

    .story-kpi:nth-child(3) {
      transition-delay: 60ms;
    }

    .story-card:hover .story-kpi,
    .story-card:focus-visible .story-kpi {
      background: #f0eadf;
      transform: translateY(-1px);
    }

    .story-kpi .kpi-val {
      color: var(--text);
      font-family: "DM Serif Display", Georgia, serif;
      font-size: 20px;
      line-height: 1;
    }

    .story-kpi .kpi-label {
      margin-top: 3px;
      color: var(--text-faint);
      font-family: "DM Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 9px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .card-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      padding-top: 2px;
    }

    .action-btn {
      position: relative;
      overflow: hidden;
      padding: 5px 12px;
      border: 0.5px solid var(--border-strong);
      border-radius: var(--radius-sm);
      background: var(--surface-soft);
      color: var(--text-soft);
      cursor: pointer;
      font-size: 10px;
      letter-spacing: 0.04em;
      transition: background 0.12s, color 0.12s, transform 0.1s;
    }

    .action-btn:hover {
      background: var(--surface-muted);
      color: var(--text);
      transform: translateY(-1px);
    }

    .action-btn:active {
      transform: translateY(0) scale(0.98);
    }

    .action-btn.primary {
      border-color: transparent;
      background: var(--accent);
      color: #ffffff;
    }

    .action-btn.primary:hover {
      background: var(--accent-mid);
    }

    .empty-state,
    .loading-state,
    .error-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 180px;
      gap: 10px;
      padding: 48px 16px;
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      background: var(--surface);
      color: var(--text-soft);
      text-align: center;
    }

    .loading-state {
      background:
        linear-gradient(90deg, var(--surface) 25%, var(--surface-soft) 50%, var(--surface) 75%);
      background-size: 240% 100%;
      animation: shimmer 1300ms ease-in-out infinite;
    }

    .empty-title {
      color: var(--text);
      font-size: 14px;
      font-weight: 500;
    }

    .empty-sub {
      color: var(--text-soft);
      font-size: 12px;
      font-weight: 300;
    }

    .error-state {
      border-color: rgba(192, 57, 43, 0.28);
      background: var(--red-bg);
      color: var(--red-deep);
    }

    .analysis-panel {
      margin-top: 18px;
    }

    .story-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 12px;
      padding: 20px 24px;
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      background: var(--surface);
    }

    .story-header-left {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .score-pill {
      min-width: 64px;
      padding: 10px 16px;
      border-radius: 10px;
      color: #ffffff;
      text-align: center;
    }

    .score-pill.high {
      background: var(--red-mid);
    }

    .score-pill.medium {
      background: var(--amber);
    }

    .score-pill.low {
      background: var(--accent);
    }

    .score-pill .n {
      color: #ffffff;
      font-size: 30px;
      line-height: 1;
    }

    .score-pill .t {
      margin-top: 3px;
      font-family: "DM Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 9px;
      letter-spacing: 0.12em;
      opacity: 0.75;
      text-transform: uppercase;
    }

    .story-info h2 {
      color: var(--text);
      font-size: 22px;
    }

    .story-info .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 4px;
      color: var(--text-faint);
      font-family: "DM Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 10px;
    }

    .status-badge {
      align-self: flex-start;
      padding: 4px 12px;
      border-radius: 20px;
      font-family: "DM Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .status-badge.high {
      border: 0.5px solid rgba(192, 57, 43, 0.2);
      background: var(--red-bg);
      color: var(--red-deep);
    }

    .status-badge.medium {
      border: 0.5px solid rgba(146, 88, 10, 0.2);
      background: var(--amber-bg);
      color: var(--amber);
    }

    .status-badge.low {
      border: 0.5px solid rgba(29, 78, 54, 0.16);
      background: var(--green-light);
      color: var(--green-deep);
    }

    .metrics-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .metric-card {
      padding: 12px 14px;
      border-radius: var(--radius-md);
      background: var(--surface-soft);
    }

    .metric-card .val {
      color: var(--text);
      font-size: 24px;
      line-height: 1;
    }

    .metric-card .val.bad {
      color: var(--red-mid);
    }

    .metric-card .val.ok {
      color: var(--accent-mid);
    }

    .metric-card .lbl {
      margin-top: 4px;
      color: var(--text-soft);
      font-size: 11px;
      font-weight: 300;
    }

    .metric-card .delta {
      margin-top: 6px;
      color: var(--text-faint);
      font-size: 10px;
    }

    .metric-card .delta.down {
      color: var(--red-mid);
    }

    .metric-card .delta.up {
      color: var(--accent-mid);
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    .detail-panel {
      padding: 16px 20px;
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      background: var(--surface);
    }

    .panel-title {
      margin-bottom: 12px;
      color: var(--text-faint);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .issue-row,
    .rec-item {
      display: flex;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 0.5px solid var(--border);
    }

    .issue-row:last-child,
    .rec-item:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .issue-icon,
    .rec-num {
      display: flex;
      flex: 0 0 auto;
      align-items: center;
      justify-content: center;
      margin-top: 1px;
      border-radius: 6px;
      font-family: "DM Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 11px;
    }

    .issue-icon {
      width: 28px;
      height: 28px;
    }

    .issue-icon.red {
      background: var(--red-bg);
      color: var(--red-mid);
    }

    .issue-icon.amber {
      background: var(--amber-bg);
      color: var(--amber);
    }

    .issue-icon.green {
      background: var(--green-light);
      color: var(--green-deep);
    }

    .issue-body .title,
    .rec-body .title {
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
    }

    .issue-body .desc,
    .rec-body .desc {
      margin-top: 2px;
      color: var(--text-soft);
      font-size: 12px;
      font-weight: 300;
      line-height: 1.45;
    }

    .bar-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 9px;
    }

    .bar-label {
      min-width: 92px;
      color: var(--text-soft);
      font-size: 12px;
      font-weight: 300;
    }

    .bar-track {
      flex: 1;
      height: 6px;
      overflow: hidden;
      border-radius: 3px;
      background: var(--surface-soft);
    }

    .bar-fill {
      height: 100%;
      border-radius: 3px;
    }

    .bar-val {
      min-width: 38px;
      color: var(--text-soft);
      font-family: "DM Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 11px;
      text-align: right;
    }

    .rec-num {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      background: var(--accent);
      color: #ffffff;
    }

    .one-col {
      margin-bottom: 12px;
    }

    .story-card .action-btn {
      position: relative;
      z-index: 1;
    }

    .fi-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex: 0 0 auto;
    }
    .fi-dot-all  { background: var(--text-faint); }
    .fi-dot-high { background: var(--red-mid); }
    .fi-dot-medium { background: var(--amber); }
    .fi-dot-low  { background: var(--accent-mid); }

    @media (max-width: 900px) {
      .dashboard {
        width: min(100% - 20px, 1180px);
        margin-top: 10px;
      }

      .top-bar,
      .story-header {
        flex-direction: column;
        align-items: stretch;
      }

      .top-actions {
        justify-content: space-between;
      }

      .body-grid,
      .two-col {
        grid-template-columns: 1fr;
      }

      .sidebar {
        border-right: 0;
        border-bottom: 0.5px solid var(--border);
      }
    }

    @media (max-width: 620px) {
      .top-bar,
      .sidebar,
      .main-panel {
        padding: 18px;
      }

      .story-card {
        grid-template-columns: 1fr;
      }

      .score-slab {
        flex-direction: row;
        justify-content: space-between;
        padding: 12px 16px;
      }

      .story-meta,
      .story-meta-right {
        flex-direction: column;
        align-items: flex-start;
      }

      .metrics-row,
      .stats-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 1ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="dashboard" id="dashboard">
    <header class="top-bar">
      <div>
        <div class="eyebrow">Story Performance</div>
        <h1>Story <em>AI</em> Dashboard</h1>
        <p class="subtitle">Content performance monitoring</p>
      </div>
      <div class="top-actions">
        <div class="last-updated" id="lastUpdated">Connecting to API</div>
        <button class="refresh-btn" id="refreshButton" type="button">Refresh</button>
      </div>
    </header>

    <div class="body-grid">
      <aside class="sidebar" aria-label="Dashboard controls">
        <section>
          <div class="section-label">Snapshot</div>
          <div class="stats-grid">
            <div class="stat-card"><div class="val" id="totalStories">0</div><div class="lbl">Total stories</div></div>
            <div class="stat-card"><div class="val" id="highPriority">0</div><div class="lbl">High priority</div></div>
            <div class="stat-card"><div class="val" id="avgScore">0</div><div class="lbl">Underperforming</div></div>
            <div class="stat-card"><div class="val" id="issueCount">0</div><div class="lbl">Open issues</div></div>
          </div>
        </section>

        <section>
          <div class="section-label">Filter by priority</div>
          <div class="filter-list" id="filters" role="group" aria-label="Filter stories by priority">
            <button class="filter-item active" type="button" data-filter="all">
              <span class="fi-left"><span class="fi-icon"><span class="fi-dot fi-dot-all"></span></span> All stories</span>
              <span class="badge" id="countAll">0</span>
            </button>
            <button class="filter-item" type="button" data-filter="high">
              <span class="fi-left"><span class="fi-icon"><span class="fi-dot fi-dot-high"></span></span> Needs attention</span>
              <span class="badge" id="countHigh">0</span>
            </button>
            <button class="filter-item" type="button" data-filter="medium">
              <span class="fi-left"><span class="fi-icon"><span class="fi-dot fi-dot-medium"></span></span> Monitor closely</span>
              <span class="badge" id="countMedium">0</span>
            </button>
            <button class="filter-item" type="button" data-filter="low">
              <span class="fi-left"><span class="fi-icon"><span class="fi-dot fi-dot-low"></span></span> On track</span>
              <span class="badge" id="countLow">0</span>
            </button>
          </div>
        </section>

        <section>
          <div class="section-label">Overview</div>
          <div class="ai-box">
            <span id="summaryText">Loading analyzer summary...</span>
          </div>
        </section>
      </aside>

      <section class="main-panel" aria-label="Story recommendations">
        <div class="panel-header">
          <h2>Recommendations</h2>
          <div class="count-note" id="statusText">Connecting to API...</div>
        </div>

<div class="story-list" id="stories">
          <div class="loading-state">Loading story analysis...</div>
        </div>
      </section>
    </div>
  </main>

  <script>
    const API_BASE = "http://127.0.0.1:8000";
    const state = {
      stories: [],
      summary: null,
      filter: "all"
    };

    const els = {
      stories: document.getElementById("stories"),
      statusText: document.getElementById("statusText"),
      lastUpdated: document.getElementById("lastUpdated"),
      refreshButton: document.getElementById("refreshButton"),
      filters: document.getElementById("filters"),
      totalStories: document.getElementById("totalStories"),
      highPriority: document.getElementById("highPriority"),
      avgScore: document.getElementById("avgScore"),
      issueCount: document.getElementById("issueCount"),
      summaryText: document.getElementById("summaryText"),
      countAll: document.getElementById("countAll"),
      countHigh: document.getElementById("countHigh"),
      countMedium: document.getElementById("countMedium"),
      countLow: document.getElementById("countLow")
    };

    function getPriority(story) {
      if (story.priority_score >= 70) return "high";
      if (story.priority_score >= 30) return "medium";
      return "low";
    }

    function formatPriority(priority) {
      return priority.charAt(0).toUpperCase() + priority.slice(1);
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function getIssueCopy(issue) {
      const copy = {
        "Low completion rate": {
          title: "Low completion rate",
          description: "Users are dropping off before the story ends. Tighten the opening hook and remove slow setup.",
          tone: "red"
        },
        "Low click-through rate": {
          title: "Low click-through rate",
          description: "The call-to-action is not earning enough taps. Test clearer CTA copy and move it earlier in the story.",
          tone: "red"
        },
        "Low visibility": {
          title: "Low visibility",
          description: "The story is reaching a smaller audience than expected. Review placement, tags and distribution timing.",
          tone: "amber"
        }
      };

      return copy[issue] || {
        title: issue,
        description: "This issue is affecting story performance and should be reviewed.",
        tone: "amber"
      };
    }

    function getRecommendations(story) {
      const issues = new Set(story.issues || []);
      const recommendations = [];

      if (issues.has("Low completion rate")) {
        recommendations.push({
          title: "Rework the opening hook",
          description: "Lead with the strongest moment, question or stat in the first few seconds so viewers have a reason to continue."
        });
        recommendations.push({
          title: "Shorten the story path",
          description: "Trim setup and secondary context. Keep each slide focused on one job and move quickly toward the payoff."
        });
      }

      if (issues.has("Low click-through rate")) {
        recommendations.push({
          title: "Move the CTA earlier",
          description: "Add a mid-story prompt while attention is still high, then repeat a concise CTA at the end."
        });
      }

      if (issues.has("Low visibility")) {
        recommendations.push({
          title: "Review placement and tags",
          description: "Audit category tags, publishing time and placement slots to make sure the story is being surfaced to the right audience."
        });
      }

      if (!recommendations.length) {
        recommendations.push({
          title: "Keep monitoring performance",
          description: "This story has no major flagged issues. Watch the next 24 hours for changes in completion or click-through behavior."
        });
      }

      return recommendations;
    }

    function getFilterReadout(filter) {
      const counts = getCounts();
      const commonIssue = getMostCommonIssue();

      if (filter === "high") {
        return counts.high
          ? `${counts.high} high-priority stories need attention. Look first at completion and click-through issues.`
          : "No high-priority stories are currently in the queue.";
      }

      if (filter === "medium") {
        return counts.medium
          ? `${counts.medium} medium-priority stories should be monitored closely.`
          : "No medium-priority stories are currently in the queue.";
      }

      if (filter === "low") {
        return counts.low
          ? `${counts.low} low-priority stories are performing well. Keep monitoring them.`
          : "No low-priority stories are currently in the queue.";
      }

      if (commonIssue) {
        return `Most stories are underperforming due to ${commonIssue.toLowerCase()}, suggesting the team should investigate the common engagement pattern first.`;
      }

      return state.summary?.insight || "No analyzer summary is available yet.";
    }

    function getCounts() {
      return state.stories.reduce((acc, story) => {
        const priority = getPriority(story);
        acc[priority] += 1;
        if (story.priority_score >= 30) acc.underperforming += 1;
        acc.issues += story.issues.length;
        acc.score += story.priority_score;
        return acc;
      }, { high: 0, medium: 0, low: 0, underperforming: 0, issues: 0, score: 0 });
    }

    function getMostCommonIssue() {
      const issueCounts = state.stories.reduce((acc, story) => {
        story.issues.forEach(issue => {
          acc[issue] = (acc[issue] || 0) + 1;
        });
        return acc;
      }, {});
      const sortedIssues = Object.entries(issueCounts).sort((a, b) => b[1] - a[1]);
      return sortedIssues[0]?.[0] || "";
    }

    function setLoading(isLoading) {
      els.refreshButton.disabled = isLoading;
      els.refreshButton.textContent = isLoading ? "Refreshing" : "Refresh";
    }

    function updateMetrics() {
      const total = state.stories.length;
      const counts = getCounts();

      els.totalStories.textContent = total;
      els.highPriority.textContent = counts.high;
      els.avgScore.textContent = counts.underperforming;
      els.issueCount.textContent = counts.issues;
      els.countAll.textContent = total;
      els.countHigh.textContent = counts.high;
      els.countMedium.textContent = counts.medium;
      els.countLow.textContent = counts.low;
      els.summaryText.textContent = getFilterReadout(state.filter);
    }

    function renderStories() {
      const filteredStories = state.filter === "all"
        ? state.stories
        : state.stories.filter(story => getPriority(story) === state.filter);

      els.statusText.textContent = `${filteredStories.length} of ${state.stories.length} stories shown`;

      if (!filteredStories.length) {
        els.stories.innerHTML = `
          <div class="empty-state">
            <div class="empty-title">No stories in this tier</div>
            <div class="empty-sub">There are no stories matching the selected priority filter right now.</div>
          </div>
        `;
        return;
      }

      els.stories.innerHTML = filteredStories.map(story => {
        const ctr = story.ctr != null ? story.ctr + "% CTR" : "";
        const priority = getPriority(story);
        const tags = story.issues.length
          ? story.issues.map(issue => {
              const tagClass = issue === "Low visibility" ? "warn" : "issue";
              return `<span class="tag ${tagClass}">${escapeHtml(issue)}</span>`;
            }).join("")
          : '<span class="tag ok">No flagged issues</span>';
        const actionClass = priority === "low" ? "action-btn" : "action-btn primary";
        const actionLabel = priority === "low" ? "View analysis" : "Get fix suggestions";
        const actionMode = priority === "low" ? "analysis" : "fix";

        return `
          <article class="story-card" role="link" tabindex="0" data-story-id="${escapeHtml(story.story_id)}">
            <div class="score-slab ${priority}">
              <div class="num">${escapeHtml(story.priority_score)}</div>
              <div class="tier">${formatPriority(priority)}</div>
            </div>
            <div class="story-body">
              <div class="story-meta">
                <div class="story-title">${escapeHtml(story.title)}</div>
                ${ctr ? `<div class="story-meta-right"><div class="story-ts">${escapeHtml(ctr)}</div></div>` : ""}
              </div>
              <div class="tags">${tags}</div>
              <div class="card-actions">
                <button class="${actionClass}" type="button" data-mode="${actionMode}" data-story-id="${escapeHtml(story.story_id)}">${actionLabel}</button>
              </div>
            </div>
          </article>
        `;
      }).join("");
    }

    function renderBar(label, value, color) {
      return `
        <div class="bar-row">
          <div class="bar-label">${escapeHtml(label)}</div>
          <div class="bar-track"><div class="bar-fill" style="width: ${value}%; background: ${color};"></div></div>
          <div class="bar-val">${value}%</div>
        </div>
      `;
    }

    function renderError(message) {
      els.lastUpdated.textContent = "API unavailable";
      els.statusText.textContent = "API unavailable";
      els.stories.innerHTML = `
        <div class="error-state">
          <div class="empty-title">${escapeHtml(message)}</div>
          <div class="empty-sub">Start the FastAPI backend on port 8000, then refresh this dashboard.</div>
        </div>
      `;
    }

    async function loadStories() {
      setLoading(true);
      els.lastUpdated.textContent = "Refreshing";
      els.statusText.textContent = "Connecting to API...";

      try {
        const [analysisRes, summaryRes] = await Promise.all([
          fetch(`${API_BASE}/analyze`),
          fetch(`${API_BASE}/summary`)
        ]);

        if (!analysisRes.ok) {
          throw new Error(`Analyze request failed with ${analysisRes.status}`);
        }

        const analysis = await analysisRes.json();
        const summary = summaryRes.ok ? await summaryRes.json() : null;

        state.stories = analysis.results || [];
        state.summary = summary;

        updateMetrics();
        renderStories();
        els.lastUpdated.textContent = "Updated just now";
      } catch (error) {
        console.error(error);
        renderError("Could not load story analysis.");
      } finally {
        setLoading(false);
      }
    }

    els.refreshButton.addEventListener("click", loadStories);

    els.filters.addEventListener("click", event => {
      const button = event.target.closest("[data-filter]");
      if (!button) return;

      state.filter = button.dataset.filter;
      document.querySelectorAll(".filter-item").forEach(item => {
        item.classList.toggle("active", item === button);
      });
      updateMetrics();
      renderStories();
    });

    els.stories.addEventListener("click", event => {
      const modeButton = event.target.closest("[data-mode]");
      const card = event.target.closest("[data-story-id]");
      const storyId = Number(modeButton?.dataset.storyId || card?.dataset.storyId);
      const story = state.stories.find(item => item.story_id === storyId);
      if (!story) return;

      const mode = modeButton?.dataset.mode || "analysis";
      window.location.href = `story.html?id=${encodeURIComponent(story.story_id)}&mode=${encodeURIComponent(mode)}`;
    });

    els.stories.addEventListener("keydown", event => {
      const card = event.target.closest("[data-story-id]");
      if (!card || (event.key !== "Enter" && event.key !== " ")) return;

      event.preventDefault();
      window.location.href = `story.html?id=${encodeURIComponent(card.dataset.storyId)}`;
    });

    loadStories();
  </script>
</body>
</html>
