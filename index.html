<!DOCTYPE html>
<html>
<head>
  <title>Story AI Dashboard</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 10px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .high {
      border-left: 5px solid red;
    }

    .medium {
      border-left: 5px solid orange;
    }

    .low {
      border-left: 5px solid green;
    }
  </style>
</head>
<body>

<h1>📊 Story AI Dashboard</h1>

<div id="stories"></div>

<script>
async function loadStories() {
  const res = await fetch("http://127.0.0.1:8000/analyze");
  const data = await res.json();

  const container = document.getElementById("stories");
  container.innerHTML = "";

  data.results.forEach(story => {
    let priorityClass = "low";

    if (story.priority_score > 60) priorityClass = "high";
    else if (story.priority_score > 30) priorityClass = "medium";

    const div = document.createElement("div");
    div.className = `card ${priorityClass}`;

    div.innerHTML = `
      <h3>${story.title}</h3>
      <p><strong>Priority:</strong> ${story.priority_score}</p>
      <p><strong>Issues:</strong> ${story.issues.join(", ")}</p>
      <p><strong>AI Insight:</strong> ${story.ai_feedback}</p>
    `;

    container.appendChild(div);
  });
}

loadStories();
</script>

</body>
</html>
